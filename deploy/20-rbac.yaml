apiVersion: v1
kind: ServiceAccount
metadata:
  name: keycloak
  namespace: keycloak
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: keycloak-k8store
  namespace: keycloak
rules:
  - apiGroups: ["k8store.dominikschlosser.github.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Only needed with --spi-datastore--k8store--resolve-references=true, which resolves
  # ${secret:name:key} references in CRs from Secrets in this namespace.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: keycloak-k8store
  namespace: keycloak
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: keycloak-k8store
subjects:
  - kind: ServiceAccount
    name: keycloak
    namespace: keycloak
