apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: keycloak
  labels:
    app: keycloak
spec:
  replicas: 2
  selector:
    matchLabels:
      app: keycloak
  strategy:
    # With required podAntiAffinity on 2 worker nodes a surge pod can never schedule,
    # so replace pods in place instead of surging.
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      serviceAccountName: keycloak
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: keycloak
              topologyKey: kubernetes.io/hostname
      containers:
        - name: keycloak
          image: localhost:5001/keycloak-k8store:dev
          # The :dev tag is rebuilt in place by scripts/deploy.sh, so always re-pull.
          imagePullPolicy: Always
          # No --optimized: provider inclusion (EnvironmentDependentProviderFactory.isSupported,
          # e.g. the area-gated k8store factories) is decided during Keycloak's augmentation, so
          # the KC_SPI_DATASTORE__K8STORE__* env vars must be visible to it. A non-optimized
          # start re-augments in the pod when those options change (e.g. toggling AREAS=all);
          # with unchanged options the build cache baked into the image is reused. This also
          # means every build option from the Dockerfile's kc.sh build must be repeated here -
          # a re-augmenting start derives the configuration from this command alone.
          args:
            - start
            - --db=postgres
            - --features=stateless
            # organizations require the opt-in 'organization' area when groups are CR-backed
            # (the built-in JPA organization store cannot reference CR groups; boot validation
            # rejects feature-on + organization-area-off). To use organizations: enable the
            # area (e.g. KC_SPI_DATASTORE__K8STORE__AREAS=all) AND drop this flag.
            - --features-disabled=organization
            - --spi-datastore--provider=k8store
            - --spi-realm--jpa--enabled=false
            - --spi-realm-cache--default--enabled=false
            # like the realm cache: with the authorization area the informer mirror is the
            # cache; without it (default) authorization data is JPA-served and uncached reads
            # are fine under stateless
            - --spi-authorization-cache--default--enabled=false
            - --health-enabled=true
            - --metrics-enabled=true
            - --hostname-strict=false
            - --http-enabled=true
          env:
            - name: KC_DB_URL
              value: jdbc:postgresql://postgres:5432/keycloak
            - name: KC_DB_USERNAME
              value: keycloak
            - name: KC_DB_PASSWORD
              value: keycloak
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              value: admin
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              value: admin
            - name: KC_BOOTSTRAP_ADMIN_CLIENT_ID
              value: temp-admin
            - name: KC_BOOTSTRAP_ADMIN_CLIENT_SECRET
              value: mysecret
            - name: KC_SPI_DATASTORE__K8STORE__READ_ONLY
              value: "false"
          ports:
            - name: http
              containerPort: 8080
            - name: management
              containerPort: 9000
          # Generous budgets: a non-optimized start re-augments (~1 min) when the spi env
          # options changed since the image build.
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 36
          livenessProbe:
            httpGet:
              path: /health/live
              port: 9000
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 12
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: keycloak
  labels:
    app: keycloak
spec:
  selector:
    app: keycloak
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: management
      port: 9000
      targetPort: 9000
